name: Platform CI

on:
  push:
    branches: [main, develop]
    paths:
      - "platform/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "platform/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vantoo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: vantoo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: platform/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build -w @vantoo/shared

      - name: Typecheck services
        run: |
          npm run lint -w @vantoo/auth-service
          npm run lint -w @vantoo/catalog-service
          npm run lint -w @vantoo/order-service
          npm run lint -w @vantoo/notification-service

      - name: Run unit tests
        run: npm run test -w @vantoo/auth-service

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://vantoo:test_password@localhost:5432/vantoo_test
        run: npm run migrate

      - name: Build all services
        run: npm run build
